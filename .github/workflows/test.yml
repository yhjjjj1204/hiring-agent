name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v26

      - name: Start Database
        run: |
          docker compose up -d ferretdb

          echo "Waiting for FerretDB to be ready..."
          # Use a simple loop on the runner host (which has bash)
          timeout 60s bash -c 'until printf "" 2>>/dev/null >>/dev/tcp/127.0.0.1/27017; do sleep 1; done'
          echo "FerretDB is up"

      - name: Run Pytest
        run: |
          nix develop --command pytest --cov=src --cov-report=xml

      - name: Cleanup
        if: always()
        run: |
          docker compose down

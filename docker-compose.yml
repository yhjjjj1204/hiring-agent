services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://ferret_hr:digging_for_gold_resumes@ferretdb:27017/hiring_agent
      - MONGODB_DB=hiring_agent
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - HIRING_AGENT_API_KEY=${HIRING_AGENT_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - UPLOADS_DIR=/data/uploads
    depends_on:
      ferretdb:
        condition: service_started
    volumes:
      - ./uploads:/data/uploads
    networks:
      - hiring-network
    restart: unless-stopped

  ferretdb:
    image: ghcr.io/ferretdb/ferretdb:2.7.0
    restart: on-failure
    ports:
      - "27017:27017"
    environment:
      - FERRETDB_POSTGRESQL_URL=postgres://ferret_hr:digging_for_gold_resumes@postgres:5432/postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hiring-network
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/27017"]
      interval: 3s
      timeout: 3s
      retries: 10

  postgres:
    image: ghcr.io/ferretdb/postgres-documentdb:17-0.107.0-ferretdb-2.7.0
    restart: on-failure
    environment:
      - POSTGRES_USER=ferret_hr
      - POSTGRES_PASSWORD=digging_for_gold_resumes
      - POSTGRES_DB=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ferret_hr -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  hiring-network:
    driver: bridge
  backend-network:
    internal: true

volumes:
  postgres_data:
